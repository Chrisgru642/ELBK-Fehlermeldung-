:root {
  --blue:   #1a5fa8;
  --blue2:  #2a82d8;
  --accent: #e63946;
  --green:  #2a9d8f;
  --text:   #0d2b4e;
  --card:   rgba(255,255,255,0.80);
  --shadow: 0 4px 24px rgba(20,70,160,0.13);
}

body {
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 10% 0%,  rgba(130,195,255,0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 95%, rgba(60,140,230,0.35)  0%, transparent 55%),
    linear-gradient(170deg, #b8d8f5 0%, #e2f1ff 50%, #c8e3f8 100%);
  background-attachment: fixed;
  padding-bottom: 60px;
}

/* ── HEADER ── */
header {
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 2px solid rgba(100,170,240,0.38);
  padding: 20px 24px 16px;
  text-align: center;
  box-shadow: 0 2px 20px rgba(20,70,160,0.10);
}
.hbadge {
  display: inline-block;
  background: var(--blue); color: #fff;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.13em;
  text-transform: uppercase; padding: 3px 13px;
  border-radius: 30px; margin-bottom: 8px;
}
header h1 {
  font-size: clamp(1.3rem, 4vw, 1.9rem);
  font-weight: 900; color: var(--blue); line-height: 1.2;
}
header p { margin-top: 5px; font-size: 1rem; font-weight: 600; color: #3a6ea8; }

/* ── MAIN GRID ── */
.wrap { max-width: 860px; margin: 32px auto 0; padding: 0 16px; }

.section-label {
  font-size: 0.78rem; font-weight: 800; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--blue); opacity: 0.65;
  margin-bottom: 12px;
}

/* ── BUILDING TABS ── */
.tab-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
.tab-btn {
  padding: 12px 22px;
  border: 2px solid rgba(30,100,200,0.2); border-radius: 40px;
  background: var(--card);
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
  color: var(--text); cursor: pointer; transition: all 0.18s;
}
.tab-btn:hover { background: rgba(100,180,255,0.30); border-color: var(--blue2); }
.tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 4px 16px rgba(20,70,160,0.22); }

/* ── ROOM GRID ── */
.room-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px; margin-bottom: 32px;
}
.room-btn {
  background: var(--card); border: 2px solid rgba(30,100,200,0.16);
  border-radius: 11px; padding: 13px 6px;
  text-align: center; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
  color: var(--text); transition: all 0.16s; box-shadow: var(--shadow);
}
.room-btn:hover { background: rgba(42,130,216,0.15); border-color: var(--blue2); transform: translateY(-2px); }

/* ── ERROR GRID ── */
.error-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 13px;
}
.error-btn {
  background: var(--card); border: 2px solid rgba(30,100,200,0.16);
  border-radius: 14px; padding: 18px 16px;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 1.05rem; color: var(--text);
  display: flex; align-items: center; gap: 12px;
  transition: all 0.16s; box-shadow: var(--shadow); line-height: 1.3;
}
.error-btn .ico { width: 32px; height: 32px; flex-shrink: 0; color: var(--blue); }
.error-btn .ico svg { width: 100%; height: 100%; }
.error-btn:hover { background: rgba(230,57,70,0.07); border-color: var(--accent); transform: translateY(-2px); }

/* ── DIVIDER ── */
.divider { border: none; border-top: 1.5px solid rgba(30,100,200,0.12); margin: 0 0 24px; }

/* ══════════════════════════════════════
   OVERLAY / POPUP
══════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(10,30,70,0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 16px;
}
.overlay.open { display: flex; }

.popup {
  background: #fff;
  border-radius: 22px;
  width: 100%; max-width: 520px;
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 24px 80px rgba(10,30,80,0.30);
  animation: popIn 0.28s cubic-bezier(.34,1.4,.64,1);
  padding: 30px 28px 26px;
}
@keyframes popIn { from { opacity:0; transform:scale(0.90) translateY(20px); } to { opacity:1; transform:none; } }

.popup-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.popup-title { font-size: 1.3rem; font-weight: 900; color: var(--blue); line-height: 1.2; }
.popup-sub   { font-size: 0.9rem; font-weight: 600; color: #6a9acc; margin-top: 3px; }
.popup-close {
  background: rgba(30,100,200,0.08); border: none; border-radius: 50%;
  width: 34px; height: 34px; cursor: pointer; flex-shrink: 0;
  font-size: 1.1rem; color: var(--blue); line-height: 34px; text-align: center;
  transition: background 0.15s;
}
.popup-close:hover { background: rgba(30,100,200,0.18); }

/* Sub-selection list (Fernbedienung) */
.sub-list { display: flex; flex-direction: column; gap: 10px; }
.sub-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(26,95,168,0.05); border: 2px solid rgba(26,95,168,0.15);
  border-radius: 12px; padding: 14px 16px;
  cursor: pointer; font-weight: 700; font-size: 1.05rem; color: var(--text);
  transition: all 0.15s;
}
.sub-item:hover { background: rgba(42,130,216,0.12); border-color: var(--blue2); }
.sub-arrow { color: var(--blue2); font-size: 1.1rem; margin-left: auto; }

/* FAQ checklist */
.faq-intro {
  background: rgba(42,157,143,0.08); border: 1.5px solid rgba(42,157,143,0.25);
  border-radius: 10px; padding: 11px 14px;
  font-size: 0.9rem; font-weight: 600; color: #1a5a54; margin-bottom: 14px;
}
.faq-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }
.faq-item {
  display: flex; align-items: center; gap: 11px;
  background: #fff; border: 2px solid rgba(42,157,143,0.20);
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; font-weight: 600; font-size: 0.98rem; color: var(--text);
  transition: all 0.14s; user-select: none;
}
.faq-item:hover  { background: rgba(42,157,143,0.08); border-color: var(--green); }
.faq-item.ticked { background: rgba(42,157,143,0.10); border-color: var(--green); }
.faq-box {
  width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
  border: 2px solid rgba(42,157,143,0.40); background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; transition: all 0.14s;
}
.faq-item.ticked .faq-box { background: var(--green); border-color: var(--green); color: #fff; }

/* Free text */
.free-label { font-weight: 700; font-size: 1rem; color: var(--blue); margin-bottom: 9px; }
#free-textarea {
  width: 100%; border: 2px solid rgba(30,100,200,0.20);
  border-radius: 12px; padding: 12px 14px;
  font-family: 'Outfit', sans-serif; font-size: 1rem; color: var(--text);
  background: rgba(248,251,255,0.9);
  resize: vertical; min-height: 90px; outline: none; transition: border 0.2s;
  margin-bottom: 18px;
}
#free-textarea:focus { border-color: var(--blue); }

/* Confirm summary */
.confirm-card {
  background: rgba(248,251,255,0.9); border: 2px solid rgba(30,100,200,0.15);
  border-radius: 14px; padding: 18px 16px; margin-bottom: 20px;
}
.crow {
  display: flex; gap: 12px; padding: 9px 0;
  border-bottom: 1px solid rgba(30,100,200,0.09);
}
.crow:last-child { border-bottom: none; padding-bottom: 0; }
.clabel { font-size: 0.78rem; font-weight: 800; color: #7aaedc; text-transform: uppercase; letter-spacing: .06em; min-width: 82px; padding-top: 2px; }
.cval   { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
.faq-done-item { font-size: 0.88rem; font-weight: 600; color: var(--green); }

/* Buttons */
.btn-row { display: flex; gap: 10px; }
.btn-back {
  padding: 13px 20px;
  background: rgba(255,255,255,0.8); border: 2px solid rgba(30,100,200,0.20);
  border-radius: 12px; font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 0.97rem; color: var(--blue);
  cursor: pointer; transition: all 0.16s; white-space: nowrap;
}
.btn-back:hover { background: #fff; }
.btn-primary {
  flex: 1; padding: 14px 20px;
  background: linear-gradient(135deg, #1a5fa8, #2a85dc);
  color: #fff; border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 900;
  cursor: pointer; box-shadow: 0 5px 20px rgba(20,70,160,0.25);
  transition: all 0.18s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(20,70,160,0.32); }
.btn-primary:active { transform: scale(0.98); }

.send-note { font-size: 0.84rem; font-weight: 600; color: #5a88b8; text-align: center; margin-top: 9px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 13px 26px; border-radius: 40px;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.98rem;
  color: #fff; z-index: 999;
  transition: transform 0.38s cubic-bezier(.17,.67,.35,1.2), opacity 0.38s;
  opacity: 0; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.ok   { background: var(--green); }

@media(max-width:480px) {
  .popup { padding: 22px 16px 20px; }
  .error-grid { grid-template-columns: 1fr 1fr; }
}

<body>

<!-- HEADER -->

<header>
  <div class="hbadge">🏫 Elisabeth-Lüders BK · Hamm</div>
  <h1>Fehlermeldung</h1>
  <p>Gebäude und Raum wählen, dann den Fehler melden</p>
</header>

<div class="wrap">

  <!-- GEBÄUDE -->

  <div class="section-label">Schritt 1 – Gebäude</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="selectBuilding(this, 'Gebäude A (Wirtschaftsgebäude)', 'A')">🏢 Gebäude A</button>
    <button class="tab-btn"        onclick="selectBuilding(this, 'Gebäude C (Pavillons)', 'C')">🏗️ Gebäude C</button>
    <button class="tab-btn"        onclick="selectBuilding(this, 'Gebäude D (Hauptgebäude)', 'D')">🏫 Gebäude D</button>
  </div>

  <hr class="divider"/>

  <!-- RÄUME -->

  <div class="section-label">Schritt 2 – Raum</div>
  <div class="room-grid" id="room-grid"></div>

  <hr class="divider"/>

  <!-- FEHLER -->

  <div class="section-label">Schritt 3 – Fehler auswählen</div>
  <div class="error-grid" id="error-grid"></div>

</div>

<!-- ═══════════ POPUP ═══════════ -->

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="popup" id="popup">
    <!-- content injected by JS -->
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
const BUILDINGS = {
  'Gebäude A (Wirtschaftsgebäude)': ['A002','A003','A005','A006','A009','A010','A011','A012','A104','A105','A108','A109','A112','A113','A114','A115'],
  'Gebäude C (Pavillons)':          ['C001','C003','C004','C006','C007','C009','C011','C013','C014','C016','C017','C019'],
  'Gebäude D (Hauptgebäude)':       ['D107','D109','D110','D113','D114','D115','D116','D203','D204','D206','D207','D210','D211','D213','D214','D216','D303','D306','D308','D309','D310','D311','D314','D316','DU03','DU06','DU08']
};

// Each error: name, optional subItems, optional faqItems, optional freeText
const ERRORS = [
  {
    name: 'Fernbedienung',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="3"/><circle cx="12" cy="7" r="1.2" fill="currentColor" stroke="none"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="17" x2="15" y2="17"/></svg>',
    subItems: ['Fernbedienung TV', 'Fernbedienung Beamer', 'Fernbedienung Apple TV']
  },
  {
    name: 'Beamer',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2"/><circle cx="17" cy="12" r="2"/><line x1="7" y1="12" x2="11" y2="12"/><line x1="7" y1="9.5" x2="11" y2="9.5"/><path d="M17 7V5M17 17v2"/></svg>'
  },
  {
    name: 'Drucker',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
    faqItems: ['Papier leer geprüft', 'Toner leer geprüft', 'Netzwerkverbindung am Drucker OK']
  },
  {
    name: 'Apple TV',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="19" x2="12" y2="21"/><path d="M9 12l2 2 4-4" stroke-width="2"/></svg>',
    faqItems: ['Netzwerkverbindung geprüft', 'Apple TV ist eingeschaltet', 'Apple TV kurz vom Strom getrennt (Neustart versucht)']
  },
  {
    name: 'WLAN',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5a9.97 9.97 0 0114 0"/><path d="M8.5 16a5.5 5.5 0 017 0"/><circle cx="12" cy="19.5" r="1.2" fill="currentColor" stroke="none"/><line x1="2" y1="2" x2="22" y2="22" stroke-width="1.8"/></svg>'
  },
  {
    name: 'TV',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="18" x2="12" y2="21"/></svg>',
    faqItems: ['Fernseher ist eingeschaltet', 'Fernseher hat Strom', 'Fernbedienung funktioniert']
  },
  {
    name: 'Sonstiges',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="2.5"/></svg>',
    freeText: true
  }
];

const MAILTO = 'apple@elbkhamm.de';

// ═══════════════════════════════════════
//  STATE  — single source of truth
// ═══════════════════════════════════════
let SEL = {
  building: 'Gebäude A (Wirtschaftsgebäude)',
  room:     null,
  error:    null,   // the exact name string (e.g. "Apple TV", "Fernbedienung TV")
  faq:      [],     // ticked faq item strings
  freeText: ''
};

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
window.onload = function() {
  renderRooms();
  renderErrors();
};

// ═══════════════════════════════════════
//  BUILDING
// ═══════════════════════════════════════
function selectBuilding(btn, name, short) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  SEL.building = name;
  SEL.room = null;
  renderRooms();
}

// ═══════════════════════════════════════
//  ROOMS
// ═══════════════════════════════════════
function renderRooms() {
  var g = document.getElementById('room-grid');
  g.innerHTML = '';
  BUILDINGS[SEL.building].forEach(function(r) {
    var b = document.createElement('button');
    b.className = 'room-btn';
    b.textContent = r;
    b.onclick = function() { SEL.room = r; openErrorGrid(); };
    g.appendChild(b);
  });
}

// Briefly highlight selected room
function openErrorGrid() {
  document.querySelectorAll('.room-btn').forEach(function(b) {
    b.style.background = b.textContent === SEL.room
      ? 'rgba(42,130,216,0.25)' : '';
    b.style.borderColor = b.textContent === SEL.room
      ? 'var(--blue2)' : '';
  });
  // Scroll to error section
  document.getElementById('error-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════
//  ERRORS
// ═══════════════════════════════════════
function renderErrors() {
  var g = document.getElementById('error-grid');
  g.innerHTML = '';
  ERRORS.forEach(function(err) {
    var b = document.createElement('button');
    b.className = 'error-btn';
    b.innerHTML = '<span class="ico">' + err.icon + '</span><span>' + err.name + '</span>';
    b.onclick = function() { handleError(err); };
    g.appendChild(b);
  });
}

function handleError(err) {
  if (!SEL.room) {
    showToast('⚠️ Bitte zuerst einen Raum auswählen!', 'ok');
    document.getElementById('room-grid').scrollIntoView({ behavior: 'smooth' });
    return;
  }

  // Reset FAQ/free state
  SEL.faq = [];
  SEL.freeText = '';
  SEL.error = null;

  if (err.subItems) {
    showSubPopup(err);
  } else if (err.faqItems) {
    SEL.error = err.name;
    showFaqPopup(err.name, err.faqItems);
  } else if (err.freeText) {
    SEL.error = err.name;
    showFreePopup();
  } else {
    SEL.error = err.name;
    showConfirmPopup();
  }
}

// ═══════════════════════════════════════
//  POPUP: SUB-SELECTION (Fernbedienung)
// ═══════════════════════════════════════
function showSubPopup(err) {
  var html = '<div class="popup-header">'
    + '<div><div class="popup-title">' + err.name + '</div>'
    + '<div class="popup-sub">Welches Gerät?</div></div>'
    + '<button class="popup-close" onclick="closePopup()">✕</button>'
    + '</div>'
    + '<div class="sub-list">';

  err.subItems.forEach(function(sub) {
    html += '<div class="sub-item" onclick="subSelected(\'' + sub + '\')">'
      + '<span>' + sub + '</span>'
      + '<span class="sub-arrow">›</span>'
      + '</div>';
  });
  html += '</div>';

  openPopup(html);
}

function subSelected(name) {
  SEL.error = name;
  showConfirmPopup();
}

// ═══════════════════════════════════════
//  POPUP: FAQ CHECKLIST
// ═══════════════════════════════════════
function showFaqPopup(errorName, faqItems) {
  var html = '<div class="popup-header">'
    + '<div><div class="popup-title">' + errorName + '</div>'
    + '<div class="popup-sub">Bitte zunächst prüfen</div></div>'
    + '<button class="popup-close" onclick="closePopup()">✕</button>'
    + '</div>'
    + '<div class="faq-intro">Bitte die folgenden Punkte prüfen und ggf. abhaken:</div>'
    + '<div class="faq-list" id="faq-list">';

  faqItems.forEach(function(item, i) {
    html += '<div class="faq-item" id="faq-' + i + '" onclick="toggleFaq(' + i + ',\'' + item.replace(/'/g, "\\'") + '\')">'
      + '<div class="faq-box" id="faqbox-' + i + '"></div>'
      + '<span>' + item + '</span>'
      + '</div>';
  });

  html += '</div>'
    + '<div class="btn-row">'
    + '<button class="btn-back" onclick="closePopup()">Abbrechen</button>'
    + '<button class="btn-primary" onclick="showConfirmPopup()">Weiter →</button>'
    + '</div>';

  openPopup(html);
}

function toggleFaq(i, item) {
  var el  = document.getElementById('faq-' + i);
  var box = document.getElementById('faqbox-' + i);
  var ticked = el.classList.toggle('ticked');
  box.textContent = ticked ? '✓' : '';
  if (ticked) {
    SEL.faq.push(item);
  } else {
    SEL.faq = SEL.faq.filter(function(x){ return x !== item; });
  }
}

// ═══════════════════════════════════════
//  POPUP: FREE TEXT
// ═══════════════════════════════════════
function showFreePopup() {
  var html = '<div class="popup-header">'
    + '<div><div class="popup-title">Sonstiges</div>'
    + '<div class="popup-sub">Fehlerbeschreibung</div></div>'
    + '<button class="popup-close" onclick="closePopup()">✕</button>'

function checkFreeAndContinue() {
var ta = document.getElementById(‘free-textarea’);
if (!SEL.freeText.trim()) {
ta.style.borderColor = ‘#e63946’;
ta.focus();
return;
}
showConfirmPopup();
}

// ═══════════════════════════════════════
//  POPUP: CONFIRM
// ═══════════════════════════════════════
function showConfirmPopup() {
var faqHtml = ‘’;
if (SEL.faq.length > 0) {
faqHtml = SEL.faq.map(function(f){ return ‘<div class="faq-done-item">✓ ’ + f + ‘</div>’; }).join(’’);
}

var rows = ‘’
+ ‘<div class="crow"><div class="clabel">Gebäude</div><div class="cval">’ + SEL.building + ‘</div></div>’
+ ‘<div class="crow"><div class="clabel">Raum</div><div class="cval">’ + SEL.room + ‘</div></div>’
+ ‘<div class="crow"><div class="clabel">Problem</div><div class="cval">’ + SEL.error + ‘</div></div>’;

if (faqHtml) {
rows += ‘<div class="crow"><div class="clabel">Geprüft</div><div class="cval">’ + faqHtml + ‘</div></div>’;
}
if (SEL.freeText.trim()) {
rows += ‘<div class="crow"><div class="clabel">Beschreibung</div><div class="cval">’ + esc(SEL.freeText) + ‘</div></div>’;
}
rows += ‘<div class="crow"><div class="clabel">An</div><div class="cval" style="color:var(--blue2)">’ + MAILTO + ‘</div></div>’;

var html = ‘<div class="popup-header">’
+ ‘<div><div class="popup-title">✅ Zusammenfassung</div>’
+ ‘<div class="popup-sub">Bitte prüfen und dann absenden</div></div>’
+ ‘<button class="popup-close" onclick="closePopup()">✕</button>’
+ ‘</div>’
+ ‘<div class="confirm-card">’ + rows + ‘</div>’
+ ‘<div class="btn-row">’
+ ‘<button class="btn-back" onclick="closePopup()">Abbrechen</button>’
+ ‘<button class="btn-primary" onclick="sendMail()">📧 Jetzt senden</button>’
+ ‘</div>’
+ ‘<p class="send-note">Outlook öffnet sich — einfach auf <strong>Senden</strong> klicken.</p>’;

openPopup(html);
}

// ═══════════════════════════════════════
//  SEND MAIL
// ═══════════════════════════════════════
function sendMail() {
var now  = new Date().toLocaleString(‘de-DE’, { dateStyle: ‘short’, timeStyle: ‘short’ });
var subj = ’Fehlermeldung: ’ + SEL.building + ’ / Raum ’ + SEL.room + ’ – ’ + SEL.error;
var body = ‘Fehlermeldung – Elisabeth-Lüders BK Hamm\n’
+ ‘==========================================\n\n’
+ ’Gebäude  : ’ + SEL.building + ‘\n’
+ ’Raum     : ’ + SEL.room + ‘\n’
+ ’Problem  : ’ + SEL.error + ‘\n’
+ ’Zeitpunkt: ’ + now + ‘\n’;

if (SEL.faq.length > 0) {
body += ‘\nBereits geprüft:\n’;
SEL.faq.forEach(function(f){ body += ’  ✓ ’ + f + ‘\n’; });
}
if (SEL.freeText.trim()) {
body += ‘\nBeschreibung:\n’ + SEL.freeText.trim() + ‘\n’;
}
body += ‘\n–\nGesendet über die Fehlermeldungs-App der ELB Hamm’;

window.location.href = ‘mailto:’ + MAILTO
+ ‘?subject=’ + encodeURIComponent(subj)
+ ‘&body=’    + encodeURIComponent(body);

showToast(‘📧 Outlook öffnet sich…’, ‘ok’);
closePopup();
}

// ═══════════════════════════════════════
//  POPUP HELPERS
// ═══════════════════════════════════════
function openPopup(html) {
document.getElementById(‘popup’).innerHTML = html;
document.getElementById(‘overlay’).classList.add(‘open’);
document.body.style.overflow = ‘hidden’;
}

function closePopup() {
document.getElementById(‘overlay’).classList.remove(‘open’);
document.body.style.overflow = ‘’;
}

function overlayClick(e) {
if (e.target === document.getElementById(‘overlay’)) closePopup();
}

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function esc(s) {
return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);
}

function showToast(msg, type) {
var t = document.getElementById(‘toast’);
t.textContent = msg; t.className = ’show ’ + type;
setTimeout(function(){ t.className = type; }, 3000);
}
</script>
